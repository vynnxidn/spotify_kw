<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify(kw) by vynxidn</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#121212;--surface:#181818;--surface2:#282828;--surface3:#333;
  --border:#333;--text:#fff;--dim:#b3b3b3;--dim2:#727272;
  --green:#1db954;--green2:#1ed760;--radius:6px;
  --font:'Circular','Helvetica Neue','Segoe UI',system-ui,-apple-system,sans-serif;
  --mono:'SF Mono','Fira Code','Courier New',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font)}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#555}
::selection{background:var(--green);color:#000}

/* === LAYOUT === */
.app{display:flex;height:100vh;flex-direction:column}
.main-wrap{display:flex;flex:1;overflow:hidden}

/* === SIDEBAR === */
.sidebar{
  width:230px;min-width:230px;background:#000;
  display:flex;flex-direction:column;padding:0 0 8px;overflow:hidden;
}
.sidebar-logo{
  padding:22px 24px 16px;display:flex;align-items:center;gap:6px;
}
.sidebar-logo svg{width:32px;height:32px}
.sidebar-logo h1{font-size:15px;letter-spacing:-.5px;font-weight:700;color:#fff}
.sidebar-logo h1 span{font-weight:400;font-size:10px;color:var(--dim2);margin-left:2px}
.sidebar-nav{padding:0 8px;display:flex;flex-direction:column;gap:2px}
.sidebar-nav a{
  display:flex;align-items:center;gap:14px;padding:8px 16px;
  color:var(--dim);text-decoration:none;font-size:14px;font-weight:600;
  border-radius:var(--radius);transition:all .15s;cursor:pointer;
}
.sidebar-nav a svg{width:22px;height:22px;fill:currentColor;opacity:.7}
.sidebar-nav a:hover{color:#fff}
.sidebar-nav a.active{color:#fff;background:var(--surface2)}
.sidebar-nav a.active svg{opacity:1}

.sidebar-divider{margin:14px 24px 10px;border:0;border-top:1px solid var(--border)}
.sidebar-lib-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;margin-bottom:6px}
.sidebar-lib-header h2{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim2);font-weight:600}
.sidebar-lib-header span{font-size:10px;color:var(--dim2);font-family:var(--mono)}

.sidebar-playlist{
  flex:1;overflow-y:auto;padding:0 8px;
  display:flex;flex-direction:column;gap:2px;
}
.sidebar-item{
  display:flex;align-items:center;gap:10px;padding:6px 12px;
  border-radius:var(--radius);cursor:pointer;transition:all .12s;
  font-size:13px;color:var(--dim);min-height:42px;
  border-left:2px solid transparent;
}
.sidebar-item:hover{color:#fff}
.sidebar-item.active{color:#fff;border-left-color:var(--green);background:rgba(29,185,84,.06)}
.sidebar-item .thumb{
  width:36px;height:36px;border-radius:4px;background:var(--surface2);
  flex-shrink:0;overflow:hidden;position:relative;
}
.sidebar-item .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.sidebar-item .thumb .plc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:10px}
.sidebar-item .info{flex:1;overflow:hidden}
.sidebar-item .info .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px;font-weight:500}
.sidebar-item .info .meta{font-size:10px;color:var(--dim2);font-family:var(--mono);margin-top:1px}
.sidebar-item.active .info .name{color:#fff}

.sidebar-foot{padding:6px 16px 0;font-size:10px;color:var(--dim2);display:flex;justify-content:space-between;flex-shrink:0}

/* === MAIN CONTENT === */
.content{
  flex:1;background:linear-gradient(180deg,#1e1e1e 0%,var(--bg) 300px);
  display:flex;flex-direction:column;overflow:hidden;min-width:0;
}
.content-top{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;flex-shrink:0}
.content-top h2{font-size:20px;font-weight:700}
.content-top .actions{display:flex;align-items:center;gap:10px}
#addFiles{
  background:var(--green);color:#000;border:none;padding:7px 20px;
  border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px;
  cursor:pointer;transition:all .15s;font-family:var(--font);
}
#addFiles:hover{transform:scale(1.04);background:var(--green2)}
.search-box{position:relative}
.search-box input{
  background:var(--surface2);border:1px solid transparent;color:#fff;
  padding:7px 14px 7px 34px;border-radius:20px;font-size:13px;
  width:220px;outline:none;transition:all .15s;font-family:var(--font);
}
.search-box input:focus{border-color:var(--dim2);background:#000}
.search-box input::placeholder{color:var(--dim2)}
.search-box .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim2);font-size:14px;pointer-events:none}

/* === TRACK LIST === */
.track-grid{
  flex:1;overflow-y:auto;padding:4px 16px 20px;
}
.track-grid:empty::after{
  content:'No videos yet — click + Add Files';display:block;
  text-align:center;padding:60px 20px;color:var(--dim2);font-size:13px;
}
.track-header{
  display:flex;align-items:center;padding:8px 48px 8px 42px;
  font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:1px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;
  background:var(--bg);
}
.track-header .th-title{flex:1}
.track-header .th-ext{width:60px;text-align:center}
.track-header .th-size{width:80px;text-align:right}

/* === NOW PLAYING PANEL === */
.now-panel{
  width:300px;min-width:300px;background:linear-gradient(180deg,#1a1a1a 0%,#121212 100%);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  padding:24px 20px;overflow-y:auto;align-items:center;
}
.now-panel.empty{justify-content:center}
.now-panel .empty-msg{text-align:center;color:var(--dim2);font-size:12px;letter-spacing:.5px}

.now-card-wrap{
  width:220px;height:220px;perspective:1000px;margin:10px 0 16px;flex-shrink:0;
}
.now-card{
  width:100%;height:100%;position:relative;transform-style:preserve-3d;
  animation:cardSpin 12s linear infinite;border-radius:12px;
}
.now-card:hover{animation-play-state:paused}
.now-card .face{
  position:absolute;inset:0;border-radius:12px;overflow:hidden;
  backface-visibility:hidden;background:var(--surface2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
.now-card .face img{width:100%;height:100%;object-fit:cover}
.now-card .face .plc{color:var(--dim2);font-size:28px}
.now-card .front{transform:rotateY(0deg)}
.now-card .back{transform:rotateY(180deg);background:linear-gradient(135deg,#1db954,#1ed760,#169c46);padding:20px;flex-direction:column;color:#000;text-align:center;gap:8px}
.now-card .back .big{font-size:32px;font-weight:800;letter-spacing:-1px}
.now-card .back .sub{font-size:11px;font-weight:600;opacity:.7}
@keyframes cardSpin{
  0%{transform:rotateY(0deg)}
  100%{transform:rotateY(360deg)}
}

.now-marquee-wrap{
  width:100%;overflow:hidden;height:40px;position:relative;flex-shrink:0;
  background:rgba(29,185,84,.04);border-radius:8px;border:1px solid rgba(29,185,84,.08);
}
.now-marquee{
  white-space:nowrap;overflow:hidden;height:100%;display:flex;align-items:center;
}
.now-marquee span{
  display:inline-block;padding-left:100%;
  animation:marquee 14s linear infinite;font-size:13px;font-weight:500;
  color:var(--green);letter-spacing:.5px;
}
.now-marquee span::after{content:'  ●  ' attr(data-text);color:var(--dim)}
@keyframes marquee{
  0%{transform:translateX(0)}
  100%{transform:translateX(-50%)}
}

.now-info{width:100%;text-align:center;flex-shrink:0;margin-top:4px}
.now-info .n-title{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
.now-info .n-meta{font-size:11px;color:var(--dim2);font-family:var(--mono)}
.now-info .n-meta .dot{color:var(--dim2);margin:0 6px}

.now-visualizer{
  width:100%;height:40px;display:flex;align-items:center;justify-content:center;gap:3px;margin-top:12px;flex-shrink:0;
}
.now-visualizer span{
  width:4px;background:var(--green);border-radius:2px;animation:viz 1s ease-in-out infinite;
}
.now-visualizer span:nth-child(1){height:16px;animation-delay:0s}
.now-visualizer span:nth-child(2){height:24px;animation-delay:.15s}
.now-visualizer span:nth-child(3){height:32px;animation-delay:.3s}
.now-visualizer span:nth-child(4){height:20px;animation-delay:.45s}
.now-visualizer span:nth-child(5){height:28px;animation-delay:.6s}
.now-visualizer span:nth-child(6){height:36px;animation-delay:.75s}
.now-visualizer span:nth-child(7){height:22px;animation-delay:.9s}
.now-visualizer span:nth-child(8){height:18px;animation-delay:1.05s}
@keyframes viz{0%,100%{opacity:.3}50%{opacity:1}}

.track{
  display:flex;align-items:center;gap:12px;
  padding:6px 16px;border-radius:var(--radius);
  cursor:pointer;transition:all .12s;position:relative;
}
.track:hover{background:var(--surface2)}
.track.active{background:rgba(29,185,84,.08)}
.track .idx{
  width:24px;text-align:right;font-size:13px;color:var(--dim2);
  font-variant-numeric:tabular-nums;flex-shrink:0;
}
.track.active .idx{color:var(--green)}
.track .t-thumb{
  width:40px;height:40px;border-radius:4px;background:var(--surface3);
  flex-shrink:0;overflow:hidden;position:relative;
}
.track .t-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.track .t-thumb .plc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:12px}
.track .t-info{flex:1;min-width:0}
.track .t-info .t-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.track .t-info .t-sub{font-size:11px;color:var(--dim2);margin-top:1px}
.track.active .t-info .t-name{color:#fff}
.track .t-ext{
  width:60px;text-align:center;font-size:10px;color:var(--dim2);
  text-transform:uppercase;font-family:var(--mono);flex-shrink:0;
}
.track .t-size{
  width:80px;text-align:right;font-size:12px;color:var(--dim2);
  font-family:var(--mono);flex-shrink:0;
}
.track .t-play{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:24px;height:24px;display:none;align-items:center;justify-content:center;
}
.track:hover .t-play{display:flex}
.track.active .idx{display:none}
.track.active:hover .idx{display:none}
.track.active .t-play{display:flex}
.track .t-play svg{width:14px;height:14px;fill:var(--text);margin-left:1px}
.track.active .t-play svg{fill:var(--green)}

/* === BOTTOM PLAYER BAR === */
.player-bar{
  flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;height:72px;gap:12px;z-index:10;
}
.player-left{display:flex;align-items:center;gap:12px;width:260px;min-width:0}
.player-left .thumb{
  width:48px;height:48px;border-radius:4px;background:var(--surface2);
  flex-shrink:0;overflow:hidden;position:relative;
}
.player-left .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.player-left .thumb .plc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:14px}
.player-left .info{min-width:0}
.player-left .info .name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.player-left .info .meta{font-size:10px;color:var(--dim2);font-family:var(--mono)}

.player-center{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;max-width:600px;margin:0 auto}
.player-center .btns{display:flex;align-items:center;gap:12px}
.player-center .btns button{
  background:transparent;border:none;color:var(--dim);cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-size:14px;border-radius:50%;
}
.player-center .btns button:hover{color:#fff}
.player-center .btns button.active{color:var(--green)}
.player-center .btns .play-btn{
  width:32px;height:32px;background:#fff;color:#000;font-size:14px;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.player-center .btns .play-btn:hover{transform:scale(1.06);color:#000}
.player-center .btns svg{width:16px;height:16px;fill:currentColor}
.player-progress{display:flex;align-items:center;gap:8px;width:100%}
.player-progress .time{font-size:10px;color:var(--dim2);font-family:var(--mono);min-width:36px;font-variant-numeric:tabular-nums}
.player-progress .time.r{text-align:right}
#seek{flex:1;height:4px;-webkit-appearance:none;appearance:none;background:var(--surface3);border-radius:2px;outline:none;cursor:pointer}
#seek::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer;opacity:0;transition:opacity .15s}
#seek:hover::-webkit-slider-thumb,#seek:active::-webkit-slider-thumb{opacity:1}
#seek::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:none;cursor:pointer}

.player-right{display:flex;align-items:center;gap:6px;width:180px;justify-content:flex-end}
.player-right button{
  background:transparent;border:none;color:var(--dim);cursor:pointer;
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  transition:all .12s;font-size:12px;border-radius:50%;
}
.player-right button:hover{color:#fff}
.player-right .vol-wrap{display:flex;align-items:center;gap:4px}
.player-right .vol-wrap input{width:70px;height:4px;-webkit-appearance:none;appearance:none;background:var(--surface3);border-radius:2px;outline:none;cursor:pointer}
.player-right .vol-wrap input::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:#fff;cursor:pointer}
.player-right .vol-wrap input::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#fff;border:none;cursor:pointer}

/* === VIDEO === */
#video{display:none}
</style>
</head>
<body>
<input type="file" id="filePicker" multiple accept="video/*,.mp4,.webm,.ogg,.mov,.avi,.mkv,.wmv,.flv,.m4v,.3gp,.ts,.mts,.m2ts" style="display:none">
<video id="video" preload="metadata" playsinline></video>

<div class="app">
  <div class="main-wrap">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="14" fill="none" stroke="var(--green)" stroke-width="2"/><path d="M11 12v8l7-4z" fill="var(--green)"/></svg>
        <h1>Spotify<span>(kw) by vynxidn</span></h1>
      </div>
      <div style="padding:2px 24px 12px;font-size:10px;color:var(--dim2);letter-spacing:.5px;line-height:1.4">
        Mahasiswa Teknik Informatika &#183; Angkatan 24
      </div>
      <nav class="sidebar-nav">
        <a class="active" id="navHome"><svg viewBox="0 0 24 24"><path d="M12 3L4 9v12h5v-7h6v7h5V9z"/></svg>Home</a>
        <a id="navSearch"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/><path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Search</a>
        <button id="addFiles" style="margin:8px 16px;background:transparent;border:1px solid var(--dim2);color:var(--dim);padding:8px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)">+ Add Files</button>
      </nav>
      <hr class="sidebar-divider">
      <div class="sidebar-lib-header">
        <h2>Your Library</h2>
        <span id="sideCount">0</span>
      </div>
      <div class="sidebar-playlist" id="sidePlaylist"></div>
      <div class="sidebar-foot">
        <span id="sideStat">idle</span>
        <span id="sideInfo"></span>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="content" id="mainContent">
      <div class="content-top" id="contentTop">
        <h2 id="pageTitle">Home</h2>
        <div class="actions">
          <div class="search-box" id="searchBox" style="display:none">
            <span class="ico">&#8981;</span>
            <input type="text" id="searchInput" placeholder="Search videos..." spellcheck="false">
          </div>
        </div>
      </div>
      <div class="track-grid" id="trackGrid"></div>
    </main>

    <!-- NOW PLAYING PANEL -->
    <aside class="now-panel empty" id="nowPanel">
      <div class="empty-msg">Select a video<br>to see preview</div>
      <div class="now-card-wrap" id="nowCardWrap" style="display:none">
        <div class="now-card" id="nowCard">
          <div class="face front" id="cardFront">
            <img id="cardThumb" style="display:none" alt="">
            <div class="plc" id="cardPlc">&#9654;</div>
          </div>
          <div class="face back">
            <div class="big">&#9835;</div>
            <div class="sub" id="cardBackText">now spinning</div>
          </div>
        </div>
      </div>
      <div class="now-marquee-wrap" id="marqueeWrap" style="display:none">
        <div class="now-marquee"><span id="marqueeText" data-text="">loading...</span></div>
      </div>
      <div class="now-info" id="nowInfo" style="display:none">
        <div class="n-title" id="nowTitle">-</div>
        <div class="n-meta"><span id="nowExt">-</span><span class="dot">&#183;</span><span id="nowSize">-</span></div>
      </div>
      <div class="now-visualizer" id="visualizer" style="display:none">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </aside>
  </div>

  <!-- BOTTOM PLAYER BAR -->
  <div class="player-bar" id="playerBar">
    <div class="player-left">
      <div class="thumb" id="barThumb">
        <div class="plc">&#9654;</div>
      </div>
      <div class="info">
        <div class="name" id="barName">No video</div>
        <div class="meta" id="barMeta">select a file</div>
      </div>
    </div>
    <div class="player-center">
      <div class="btns">
        <button id="btnShuffle" title="Shuffle (S)"><svg viewBox="0 0 24 24"><path d="M17 3l4 4-4 4"/><path d="M3 7h13l-4 4"/><path d="M17 13l4 4-4 4"/><path d="M3 17h13l-4-4"/></svg></button>
        <button id="btnPrev" title="Previous (P)"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
        <button class="play-btn" id="btnPlay" title="Play/Pause (Space)"><svg viewBox="0 0 24 24"><polygon points="8 5 19 12 8 19 8 5"/></svg></button>
        <button id="btnNext" title="Next (N)"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5-6v12z"/></svg></button>
        <button id="btnAutoplay" title="Autoplay (A)" style="font-size:11px">&#8631;</button>
      </div>
      <div class="player-progress">
        <span class="time" id="currentTime">0:00</span>
        <input type="range" id="seek" min="0" max="1000" value="0" step="any">
        <span class="time r" id="duration">0:00</span>
      </div>
    </div>
    <div class="player-right">
      <button id="btnMute" title="Mute (M)"><svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg></button>
      <div class="vol-wrap">
        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
      </div>
      <button id="btnFS" title="Fullscreen (F)"><svg viewBox="0 0 24 24"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg></button>
    </div>
  </div>
</div>

<script>
const video=document.getElementById('video');
const grid=document.getElementById('trackGrid');
const sidePlaylist=document.getElementById('sidePlaylist');
const searchInput=document.getElementById('searchInput');
const seek=document.getElementById('seek');
const curEl=document.getElementById('currentTime');
const durEl=document.getElementById('duration');
const btnPlay=document.getElementById('btnPlay');
const btnPrev=document.getElementById('btnPrev');
const btnNext=document.getElementById('btnNext');
const btnShuffle=document.getElementById('btnShuffle');
const btnAutoplay=document.getElementById('btnAutoplay');
const btnMute=document.getElementById('btnMute');
const btnFS=document.getElementById('btnFS');
const vol=document.getElementById('volume');
const picker=document.getElementById('filePicker');
const addFiles=document.getElementById('addFiles');
const pageTitle=document.getElementById('pageTitle');
const searchBox=document.getElementById('searchBox');
const barName=document.getElementById('barName');
const barMeta=document.getElementById('barMeta');
const barThumb=document.getElementById('barThumb');
const sideCount=document.getElementById('sideCount');
const sideStat=document.getElementById('sideStat');
const sideInfo=document.getElementById('sideInfo');
const navHome=document.getElementById('navHome');
const navSearch=document.getElementById('navSearch');
const nowPanel=document.getElementById('nowPanel');
const nowCardWrap=document.getElementById('nowCardWrap');
const nowCard=document.getElementById('nowCard');
const cardThumb=document.getElementById('cardThumb');
const cardPlc=document.getElementById('cardPlc');
const marqueeWrap=document.getElementById('marqueeWrap');
const marqueeText=document.getElementById('marqueeText');
const nowInfo=document.getElementById('nowInfo');
const nowTitle=document.getElementById('nowTitle');
const nowExt=document.getElementById('nowExt');
const nowSize=document.getElementById('nowSize');
const visualizer=document.getElementById('visualizer');

let files=[],currentIndex=-1,autoplay=true,shuffle=false,shuffleHistory=[],thumbnails=[];
let searchMode=false;

const EXT=new Set(['mp4','webm','ogg','mov','avi','mkv','wmv','flv','m4v','3gp','ts','mts','m2ts']);

function fmt(s){if(!s||!isFinite(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+String(sec).padStart(2,'0')}
function fmtSize(b){if(!b)return'--';const u=['B','KB','MB','GB'];let i=0;while(b>=1024&&i<3){b/=1024;i++}return(i<2?Math.round(b):b.toFixed(1))+' '+u[i]}

// --- NAV ---
navHome.addEventListener('click',()=>{searchMode=false;searchBox.style.display='none';pageTitle.textContent='Home';navHome.classList.add('active');navSearch.classList.remove('active');renderGrid()});
navSearch.addEventListener('click',()=>{searchMode=true;searchBox.style.display='block';pageTitle.textContent='Search';navSearch.classList.add('active');navHome.classList.remove('active');renderGrid();searchInput.focus()});

// --- FILE PICKER ---
addFiles.addEventListener('click',()=>picker.click());
picker.addEventListener('change',function(){if(this.files&&this.files.length)addFilesList(this.files);this.value=''});

function addFilesList(fl){
  let added=0;
  for(let i=0;i<fl.length;i++){const f=fl[i];const e=f.name.split('.').pop().toLowerCase();if(f.type.startsWith('video/')||EXT.has(e)){files.push(f);thumbnails.push(null);added++}}
  if(!added)return;
  const curFile=currentIndex>=0?files[currentIndex]:null;
  files.sort((a,b)=>a.name.toLowerCase().localeCompare(b.name.toLowerCase()));
  if(curFile)currentIndex=files.indexOf(curFile);
  renderAll();
  if(currentIndex<0){sideStat.textContent='ready';playIndex(0)}
}

function renderAll(){renderGrid();renderSidebar();sideCount.textContent=files.length}

// --- THUMBNAIL ---
const tq=[];let tb=0;const TM=3;
function qThumb(f,i){return new Promise(r=>{tq.push({f,i,r});tp()})}
function tp(){while(tb<TM&&tq.length){const{f,i,r}=tq.shift();tb++;gt(f,i).then(d=>{thumbnails[i]=d;applyTh(i);tb--;r(d);tp()})}}
function gt(f){
  return new Promise(r=>{
    try{
      const u=URL.createObjectURL(f);const v=document.createElement('video');v.muted=true;v.preload='metadata';v.playsinline=true;v.src=u;
      let cl=false;
      const cln=()=>{if(cl)return;cl=true;v.removeEventListener('loadedmetadata',m);v.removeEventListener('seeked',s);v.removeEventListener('error',e);URL.revokeObjectURL(u);v.src='';v.load()};
      const m=()=>{const d=v.duration||0;v.currentTime=Math.min(d>30?10:d*.25,d>1?d*.9:0)};
      const s=()=>{try{const c=document.createElement('canvas');c.width=160;c.height=160;const ctx=c.getContext('2d');if(ctx&&v.videoWidth&&v.videoHeight){const sx=Math.max(v.videoWidth/160,v.videoHeight/160);ctx.drawImage(v,(160-v.videoWidth/sx)/2,(160-v.videoHeight/sx)/2,v.videoWidth/sx,v.videoHeight/sx);r(c.toDataURL('image/jpeg',60))}else r(null)}catch(e){r(null)}cln()};
      const e=()=>{r(null);cln()};
      v.addEventListener('loadedmetadata',m);v.addEventListener('seeked',s);v.addEventListener('error',e);v.load();
    }catch(e){r(null)}
  })
}
function applyTh(i){
  // main track list
  const track=grid.querySelector(`[data-idx="${i}"]`);
  if(track){
    const img=track.querySelector('.t-thumb img');const plc=track.querySelector('.t-thumb .plc');
    if(img&&thumbnails[i]){img.src=thumbnails[i];img.style.display='block'}
    if(plc)plc.style.display='none';
  }
  // sidebar item
  const si=sidePlaylist.querySelector(`[data-idx="${i}"]`);
  if(si){
    const img=si.querySelector('.thumb img');const plc=si.querySelector('.thumb .plc');
    if(img&&thumbnails[i]){img.src=thumbnails[i];img.style.display='block'}
    if(plc)plc.style.display='none';
  }
  // bottom bar & card
  if(i===currentIndex&&thumbnails[i]){
    const img=barThumb.querySelector('img')||Object.assign(barThumb.insertBefore(document.createElement('img'),barThumb.firstChild),{style:'width:100%;height:100%;object-fit:cover;display:block'});
    img.src=thumbnails[i];const plc=barThumb.querySelector('.plc');if(plc)plc.style.display='none';
    // right panel card
    cardThumb.src=thumbnails[i];cardThumb.style.display='block';cardPlc.style.display='none';
  }
}

// --- RENDER TRACK LIST ---
function renderGrid(){
  const q=searchMode&&searchInput.value.toLowerCase().trim();
  let items=q?files.filter(f=>f.name.toLowerCase().includes(q)):files;
  if(!items.length){grid.innerHTML='<div style="text-align:center;padding:60px 20px;color:var(--dim2);font-size:13px">'+(q?'No results found':'No videos yet — click + Add Files')+'</div>';return}
  let html=`<div class="track-header"><div class="th-title">Title</div><div class="th-ext">Format</div><div class="th-size">Size</div></div>`;
  items.forEach((f,i)=>{
    const idx=files.indexOf(f);const ext=f.name.split('.').pop().toLowerCase();const base=f.name.slice(0,-ext.length-1);const act=idx===currentIndex;
    html+=`<div class="track${act?' active':''}" data-idx="${idx}">
      <div class="t-play"><svg viewBox="0 0 24 24"><polygon points="8 5 19 12 8 19 8 5"/></svg></div>
      <span class="idx">${i+1}</span>
      <div class="t-thumb"><img style="display:none" alt=""><div class="plc">&#9654;</div></div>
      <div class="t-info"><div class="t-name" title="${esc(base)}">${esc(base)}</div><div class="t-sub">${ext}</div></div>
      <span class="t-ext">${ext}</span>
      <span class="t-size">${fmtSize(f.size)}</span>
    </div>`;
  });
  grid.innerHTML=html;
  grid.querySelectorAll('.track').forEach(el=>{el.addEventListener('click',()=>{const idx=parseInt(el.dataset.idx);playIndex(idx)})});
  // thumbnails
  items.forEach((f,i)=>{const idx=files.indexOf(f);if(!thumbnails[idx]&&!tq.some(t=>t.i===idx))qThumb(f,idx);else if(thumbnails[idx])applyTh(idx)});
  if(currentIndex>=0){const a=grid.querySelector('.active');if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'})}
}

function renderSidebar(){
  if(!files.length){sidePlaylist.innerHTML='<div style="padding:16px;text-align:center;color:var(--dim2);font-size:12px">No files</div>';return}
  let html='';
  files.forEach((f,i)=>{
    const ext=f.name.split('.').pop().toLowerCase();const base=f.name.slice(0,-ext.length-1);const act=i===currentIndex;
    html+=`<div class="sidebar-item${act?' active':''}" data-idx="${i}">
      <div class="thumb"><img style="display:none" alt=""><div class="plc">&#9654;</div></div>
      <div class="info"><div class="name">${esc(base)}</div><div class="meta">${ext} &middot; ${fmtSize(f.size)}</div></div>
    </div>`;
  });
  sidePlaylist.innerHTML=html;
  sidePlaylist.querySelectorAll('.sidebar-item').forEach(el=>{el.addEventListener('click',()=>{const idx=parseInt(el.dataset.idx);playIndex(idx)})});
  files.forEach((_,i)=>{if(thumbnails[i]){const si=sidePlaylist.querySelector(`[data-idx="${i}"]`);if(si){const img=si.querySelector('.thumb img');const plc=si.querySelector('.thumb .plc');if(img){img.src=thumbnails[i];img.style.display='block'}if(plc)plc.style.display='none'}}});
  if(currentIndex>=0){const a=sidePlaylist.querySelector('.active');if(a)a.scrollIntoView({block:'nearest',behavior:'smooth'})}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// --- PLAYBACK ---
function playIndex(idx){
  if(idx<0||idx>=files.length)return;
  currentIndex=idx;
  URL.revokeObjectURL(video.src);
  const f=files[idx];
  video.src=URL.createObjectURL(f);
  video.play().then(()=>updatePlayBtn(true)).catch(()=>{});
  updateBar();
  updateNowPanel();
  renderAll();
  sideStat.textContent=(idx+1)+'/'+files.length;
  if(shuffle){shuffleHistory.push(idx);if(shuffleHistory.length>files.length*2)shuffleHistory.splice(0,files.length)}
}

function updateNowPanel(){
  if(currentIndex<0||!files.length){nowPanel.classList.add('empty');nowCardWrap.style.display='none';marqueeWrap.style.display='none';nowInfo.style.display='none';visualizer.style.display='none';return}
  const f=files[currentIndex];const e=f.name.split('.').pop().toLowerCase();const base=f.name.slice(0,-e.length-1);
  nowPanel.classList.remove('empty');
  nowCardWrap.style.display='block';marqueeWrap.style.display='block';nowInfo.style.display='block';visualizer.style.display='flex';
  // card spin reset on new track
  nowCard.style.animation='none';void nowCard.offsetWidth;nowCard.style.animation='cardSpin 12s linear infinite';
  // marquee
  marqueeText.textContent=base;marqueeText.dataset.text=base;
  // info
  nowTitle.textContent=base;nowExt.textContent=e.toUpperCase();nowSize.textContent=fmtSize(f.size);
  // thumb
  if(thumbnails[currentIndex]){cardThumb.src=thumbnails[currentIndex];cardThumb.style.display='block';cardPlc.style.display='none'}
  else{cardThumb.style.display='none';cardPlc.style.display='flex'}
  document.getElementById('cardBackText').textContent=base.slice(0,30);
}
function updatePlayBtn(p){btnPlay.innerHTML=p?'<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>':'<svg viewBox="0 0 24 24"><polygon points="8 5 19 12 8 19 8 5"/></svg>'}
function updateBar(){
  if(currentIndex<0||!files.length){barName.textContent='No video';barMeta.textContent='select a file';return}
  const f=files[currentIndex];const e=f.name.split('.').pop().toLowerCase();barName.textContent=f.name.slice(0,-e.length-1);barMeta.textContent=e.toUpperCase()+' · '+fmtSize(f.size);
  if(thumbnails[currentIndex]){const img=barThumb.querySelector('img')||Object.assign(barThumb.insertBefore(document.createElement('img'),barThumb.firstChild),{style:'width:100%;height:100%;object-fit:cover;display:block'});img.src=thumbnails[currentIndex];const plc=barThumb.querySelector('.plc');if(plc)plc.style.display='none'}
}
function getNextIdx(){
  if(!files.length)return-1;
  if(shuffle){const a=files.map((_,i)=>i).filter(i=>!shuffleHistory.includes(i)||shuffleHistory.length>=files.length);if(!a.length){shuffleHistory=[];return Math.floor(Math.random()*files.length)}return a[Math.floor(Math.random()*a.length)]}
  let n=currentIndex+1;if(n>=files.length)n=0;return n;
}
function getPrevIdx(){
  if(!files.length)return-1;
  if(shuffle&&shuffleHistory.length>1){shuffleHistory.pop();return shuffleHistory[shuffleHistory.length-1]}
  let p=currentIndex-1;if(p<0)p=files.length-1;return p;
}
function nextTrack(){const i=getNextIdx();if(i>=0)playIndex(i)}
function prevTrack(){const i=getPrevIdx();if(i>=0)playIndex(i)}
function togglePlay(){
  if(video.paused){video.play().catch(()=>{});updatePlayBtn(true)}
  else{video.pause();updatePlayBtn(false)}
}

// --- EVENTS ---
video.addEventListener('loadedmetadata',()=>{durEl.textContent=fmt(video.duration);seek.max=video.duration||1000});
video.addEventListener('timeupdate',()=>{if(video.duration){seek.value=video.currentTime;curEl.textContent=fmt(video.currentTime)}});
video.addEventListener('ended',()=>{updatePlayBtn(false);if(autoplay)nextTrack()});
video.addEventListener('play',()=>updatePlayBtn(true));
video.addEventListener('pause',()=>updatePlayBtn(false));
seek.addEventListener('input',()=>{if(video.duration)video.currentTime=parseFloat(seek.value)});
btnPlay.addEventListener('click',togglePlay);
btnNext.addEventListener('click',nextTrack);
btnPrev.addEventListener('click',prevTrack);
btnShuffle.addEventListener('click',()=>{shuffle=!shuffle;btnShuffle.classList.toggle('active',shuffle);if(!shuffle)shuffleHistory=[]});
btnAutoplay.addEventListener('click',()=>{autoplay=!autoplay;btnAutoplay.classList.toggle('active',autoplay)});
btnMute.addEventListener('click',()=>{video.muted=!video.muted;btnMute.innerHTML=video.muted?'<svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>':'<svg viewBox="0 0 24 24"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>'});
vol.addEventListener('input',()=>{video.volume=parseFloat(vol.value);video.muted=video.volume===0});
btnFS.addEventListener('click',async()=>{if(!document.fullscreenElement){try{await document.body.requestFullscreen()}catch(e){}}else{document.exitFullscreen()}});
searchInput.addEventListener('input',renderGrid);

// --- KEYBOARD ---
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'){if(e.key==='Escape'){searchInput.blur();navHome.click()}return}
  switch(e.key){
    case' ':e.preventDefault();togglePlay();break;
    case'f':case'F':btnFS.click();break;
    case'n':case'N':case'ArrowRight':e.preventDefault();nextTrack();break;
    case'p':case'P':case'ArrowLeft':e.preventDefault();prevTrack();break;
    case'm':case'M':btnMute.click();break;
    case's':case'S':btnShuffle.click();break;
    case'a':case'A':btnAutoplay.click();break;
    case'/':e.preventDefault();navSearch.click();searchInput.focus();break;
    case'ArrowUp':e.preventDefault();vol.value=Math.min(1,parseFloat(vol.value)+.05);vol.dispatchEvent(new Event('input'));break;
    case'ArrowDown':e.preventDefault();vol.value=Math.max(0,parseFloat(vol.value)-.05);vol.dispatchEvent(new Event('input'));break;
    case'Home':e.preventDefault();if(files.length)playIndex(0);break;
    case'End':e.preventDefault();if(files.length)playIndex(files.length-1);break;
  }
});

btnAutoplay.classList.add('active');
</script>
</body>
</html>
